# 例）/menu コマンドで開くサーバー・メニュー
menu:
  home:
    title: "ホーム"
    size: 54
    menu-type: normal
    items:
      tpa:
        material: "ENDER_PEARL"
        display-name: "ᴛᴘᴀ ʀᴇǫᴜᴇꜱᴛ"
        display-name-color: "aqua"
        lore:
          - "他のプレイヤーにテレポートします"
        slot: 10
        type: "trigger"
        action:
          open_menu: "tpa"
          play_sound: "block.note_block.pling"
      netshop:
        material: "BUNDLE"
        display-name: "ɴᴇᴛꜱʜᴏᴘ"
        display-name-color: "aqua"
        lore:
          - "ネットショップを開きます"
        slot: 12
        type: "command"
        commands:
          - "netshop"
        action:
          play_sound: "block.note_block.pling"
      warp:
        material: "COMPASS"
        display-name: "ᴡᴀʀᴘ"
        display-name-color: "aqua"
        lore:
          - "指定の場所にテレポートします"
        slot: 14
        type: "trigger"
        action:
          open_menu: "warp"
          play_sound: "block.note_block.pling"
      trail:
        material: "NETHERITE_BOOTS"
        display-name: "ᴛʀᴀɪʟ"
        display-name-color: "aqua"
        lore:
          - "足跡エフェクトを変更します"
        slot: 16
        type: "command"
        commands:
          - "rpp trail"
        action:
          play_sound: "block.note_block.pling"
      bed:
        material: "RED_BED"
        display-name: "ʙᴇᴅ"
        display-name-color: "aqua"
        lore:
          - "ベッドにテレポートします"
        slot: 19
        type: "command"
        commands:
          - "home bed"
        action:
          play_sound: "block.note_block.pling"
      map:
        material: "FILLED_MAP"
        display-name: "ᴍᴀᴘ"
        display-name-color: "aqua"
        lore:
          - "マップのリンクを表示します"
        slot: 21
        type: "command"
        commands:
          - "map link"
        action:
          play_sound: "block.note_block.pling"
      rule:
        material: "BOOK"
        display-name: "&cルール"
        slot: 30
        type: "message"
        action:
          message: "&eルールページ: &bhttps://example.com/rules"
          play_sound: "block.note_block.pling"
      discord:
        material: "PAPER"
        display-name: "&bDiscord リンク"
        slot: 32
        type: "message"
        messages:
          - "&e[Discord] 以下のURLから参加してください！"
          - "&bhttps://discord.gg/example"
        action:
          play_sound: "block.note_block.pling"
      test_toggle_on:
        material: "LIME_DYE"
        display-name: "&aトグルテスト: ON (OPのみ)"
        slot: 34
        type: "message"
        action:
          message: "&aあなたはOPなのでONになっています。"
          play_sound: "block.note_block.pling"
        view-requirement:
          type: "string equals"
          placeholder: "%player_is_op%"
          value: "yes"
        fallback: "test_toggle_off"
      test_toggle_off:
        material: "GRAY_DYE"
        display-name: "&7トグルテスト: OFF (OP以外)"
        slot: 34
        type: "message"
        action:
          message: "&cあなたはOPではありません。"
          play_sound: "block.note_block.pling"
      settings:
        material: "REDSTONE_TORCH"
        display-name: "ᴍᴇɴᴜ ꜱᴇᴛᴛɪɴɢꜱ"
        display-name-color: "gold"
        lore:
          - "メニューの表示設定を変更します"
        slot: 43
        type: "trigger"
        action:
          open_menu: "settings"
          play_sound: "block.note_block.pling"
  tpa:
    title: "テレポート申請先プレイヤー選択"
    size: 54
    menu-type: player
    items:
      template:
        material: "PLAYER_HEAD"
