          - "menu setaction ORANGE_STAINED_GLASS_PANE"
      c4:
        material: "LIGHT_BLUE_STAINED_GLASS_PANE"
        display-name: "&b空色"
        slot: 13
        type: "command"
        commands:
          - "menu setaction LIGHT_BLUE_STAINED_GLASS_PANE"
      c5:
        material: "PINK_STAINED_GLASS_PANE"
        display-name: "&dピンク"
        slot: 14
        type: "command"
        commands:
          - "menu setaction PINK_STAINED_GLASS_PANE"
      c6:
        material: "PURPLE_STAINED_GLASS_PANE"
