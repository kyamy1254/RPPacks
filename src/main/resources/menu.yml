        slot: 16
        type: "command"
        commands:
          - "menu setaction BROWN_STAINED_GLASS_PANE"
      back:
        material: "BARRIER"
        display-name: "ʙᴀᴄᴋ"
        slot: 45
        type: "trigger"
        action:
          open_menu: "home"
          play_sound: "block.note_block.pling"